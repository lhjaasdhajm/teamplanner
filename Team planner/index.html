        function isFirstW(d, m) {
            const s = dateUtils.startW(d);
            let c = 0;
            for(let i=0; i<5; i++) if(dateUtils.addD(s, i).getMonth() === m.getMonth()) c++;
            return c >= 3;
        }

        function generateSchedule(m) {
            const res = [];
            const start = dateUtils.startM(m);
            const end = dateUtils.endM(m);
            const days = [];
            let c = dateUtils.addD(start, -14);
            for(let i=0; i<60; i++) { days.push(new Date(c)); c.setDate(c.getDate()+1); }

            TASKS.forEach(t => {
                let check = (d) => d.getDay() === 1;
                if(t.assignee === 'Frans') {
                    if(t.client === 'MMM') check = (d) => d.getDay() === 1;
                    else if(t.client === 'AHA' || t.client === 'Huisartsen+Punt') check = (d) => d.getDay() === 3;
                    else check = (d) => d.getDay() === 4;
                } else if(t.assignee === 'Rens') check = (d) => d.getDay() === 5;
                else if(t.assignee === 'Mustafa') {
                    if(t.client === 'ZMBR' || t.client === 'Lichtpunt' || t.client === 'Bergweide') check = (d) => d.getDay() === 2;
                    else if(t.client === 'Vitala+') check = (d) => d.getDay() === 3;
                } else if(t.assignee === 'Nicoline') {
                    if(t.client === 'Bergweide') check = (d) => d.getDay() === 2;
                    else if(t.client === 'Vitala+') check = (d) => d.getDay() === 3;
                } else check = (d) => d.getDay() === 2;

                days.forEach(d => {
                    if(!dateUtils.isSameM(d, m)) return;
                    let add = false;
                    const dow = d.getDay();
                    const dom = d.getDate();

                    if(t.frequency === 'Dagelijks') {
                        if(t.assignee === 'Frans') add = [1,3,4].includes(dow);
                        else if(t.assignee === 'Rens') add = [3,5].includes(dow);
                        else add = [2,3,5].includes(dow);
                    } else if(t.frequency === 'Wekelijks') {
                        const target = t.frequencyDetail.toLowerCase();
                        const current = dateUtils.fmtW(d).toLowerCase();
                        if(current === target) add = true;
                    } else if(t.frequency === 'Maandelijks') {
                        if(!check(d)) return;
                        if(t.frequencyDetail.includes('Laatste week')) {
                            if(isFirstW(dateUtils.addD(d, 7), d) === false) add = true;
                        } else if(t.frequencyDetail.includes('Eerste week')) {
                            if(isFirstW(d, d)) {
                                const first = days.find(x => dateUtils.isSameM(x, d) && isFirstW(x, d) && check(x));
                                if(dateUtils.isSameD(d, first)) add = true;
                            }
                        } else if(t.frequencyDetail.includes('Tweede week')) {
                            const first = days.find(x => dateUtils.isSameM(x, d) && isFirstW(x, d) && check(x));
                            if(first && dateUtils.isSameD(d, dateUtils.addD(first, 7))) add = true;
                        } else if(t.frequencyDetail.includes('Vanaf de')) {
                            const startD = parseInt(t.frequencyDetail.match(/\d+/)[0]);
                            if(dom >= startD && dom < startD + 7) {
                                const first = days.find(x => dateUtils.isSameM(x, d) && x.getDate() >= startD && check(x));
                                if(dateUtils.isSameD(d, first)) add = true;
                            }
                        }
                    } else if(t.frequency === 'Jaarlijks') {
                        if(t.frequencyDetail === 'eerste week van januari') {
                            if(d.getMonth() === 0 && isFirstW(d, d)) {
                                const first = days.find(x => x.getMonth() === 0 && isFirstW(x, x) && check(x));
                                if(dateUtils.isSameD(d, first)) add = true;
                            }
                        } else if(t.frequencyDetail === 'laatste week van december') {
                            if(d.getMonth() === 11 && isFirstW(dateUtils.addD(d, 7), d) === false) {
                                const last = days.filter(x => x.getMonth() === 11 && isFirstW(dateUtils.addD(x, 7), x) === false && check(x)).pop();
                                if(dateUtils.isSameD(d, last)) add = true;
                            }
                        } else if(t.frequencyDetail.includes('kerstmis')) {
                            const dec25 = new Date(d.getFullYear(), 11, 25);
                            const weekBefore = dateUtils.startW(dateUtils.addD(dec25, -7));
                            if(dateUtils.isSameD(dateUtils.startW(d), weekBefore) && check(d)) add = true;
                        }
                    } else if(t.frequency === 'Per kwartaal' && [0,3,6,9].includes(d.getMonth())) {
                        if(isFirstW(d, d)) {
                            const first = days.find(x => dateUtils.isSameM(x, d) && isFirstW(x, d) && check(x));
                            if(dateUtils.isSameD(d, first)) add = true;
                        }
                    }

                    if(add) res.push({ ...t, date: new Date(d), instanceId: `${t.id}-${d.toISOString().split('T')[0]}` });
                });
            });
            return res.sort((a,b) => a.date - b.date);
        }

        const App = () => {
            const [cur, setCur] = useState(new Date(2026, 2, 1));
            const [sel, setSel] = useState(new Date(2026, 2, 9));
            const [view, setView] = useState('day');
            const [done, setDone] = useState(new Set());
            const [mon, setMon] = useState(false);
            const [fComp, setFComp] = useState('all');
            const allAssignees = useMemo(() => Array.from(new Set(TASKS.map(t => t.assignee))).sort(), []);
            const allClients = useMemo(() => Array.from(new Set(TASKS.map(t => t.client))).sort(), []);
            
            const [fCli, setFCli] = useState(new Set(allClients));
            const [fAss, setFAss] = useState(new Set(['Mustafa']));
            const [tCli, setTCli] = useState(new Set(fCli));
            const [tAss, setTAss] = useState(new Set(['Mustafa']));
            const [dCli, setDCli] = useState(false);
            const [dAss, setDAss] = useState(false);

            useEffect(() => {
                const fetchData = () => {
                    if (WEB_APP_URL.includes('XXXXXXXXX')) return;
                    
                    fetch(WEB_APP_URL)
                        .then(res => res.json())
                        .then(data => {
                            if (Array.isArray(data)) {
                                setDone(new Set(data));
                            }
                        })
                        .catch(err => console.error('Fout bij ophalen data:', err));
                };

                fetchData();
                const interval = setInterval(fetchData, 30000); // Elke 30 seconden synchroniseren
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (done.size > 0) {
                    localStorage.setItem('p-done', JSON.stringify(Array.from(done)));
                }
            }, [done]);

            const sched = useMemo(() => generateSchedule(cur), [cur]);
            const base = useMemo(() => {
                if (mon) {
                    const today = new Date();
                    today.setHours(23, 59, 59, 999);
                    const startMonitoring = new Date(2026, 2, 1); // 1-3-2026
                    
                    return sched.filter(t => 
                        fCli.has(t.client) && 
                        fAss.has(t.assignee) &&
                        t.frequency !== 'Dagelijks' &&
                        t.date >= startMonitoring &&
                        t.date <= today
                    );
                }
                let r = sched.filter(t => fCli.has(t.client) && fAss.has(t.assignee));
                if(view === 'day') r = r.filter(t => dateUtils.isSameD(t.date, sel));
                else if(view === 'week') {
                    const s = dateUtils.startW(sel), e = dateUtils.addD(s, 6);
                    r = r.filter(t => t.date >= s && t.date <= e);
                }
                return r;
            }, [sched, view, sel, fCli, fAss, mon]);

            const final = useMemo(() => {
                const daily = base.filter(t => t.frequency === 'Dagelijks');
                const other = base.filter(t => t.frequency !== 'Dagelijks');
                const groups = {};
                daily.forEach(t => {
                    const k = `${t.title}-${t.date.toISOString().split('T')[0]}`;
                    if(!groups[k]) groups[k] = [];
                    groups[k].push(t);
                });
                const procDaily = Object.values(groups).map(g => g.length > 1 ? { ...g[0], isG: true, sub: g, instanceId: `g-${g[0].title}-${g[0].date.toISOString().split('T')[0]}` } : g[0]);
                let r = [...procDaily, ...other];
                if(mon) r = r.filter(t => t.frequency !== 'Dagelijks');
                if(fComp === 'open') r = r.filter(t => t.isG ? !t.sub.every(s => done.has(s.instanceId)) : !done.has(t.instanceId));
                else if(fComp === 'completed') r = r.filter(t => t.isG ? t.sub.every(s => done.has(s.instanceId)) : done.has(t.instanceId));
                return r.sort((a,b) => a.date - b.date);
            }, [base, mon, fComp, done]);

            const stats = useMemo(() => {
                const t = base.length, c = base.filter(x => done.has(x.instanceId)).length;
                return { t, c, p: t > 0 ? Math.round((c/t)*100) : 0 };
            }, [base, done]);

            const toggle = (id) => {
                let isNowDone = false;
                setDone(p => {
                    const n = new Set(p);
                    if (n.has(id)) {
                        n.delete(id);
                        isNowDone = false;
                    } else {
                        n.add(id);
                        isNowDone = true;
                        confetti({ particleCount: 80, spread: 60, origin: { y: 0.7 }, colors: ['#F8AF5F', '#ffffff'] });
                    }
                    return n;
                });

                // Verstuur naar Google Sheets
                if (!WEB_APP_URL.includes('XXXXXXXXX')) {
                    fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Belangrijk voor Google Apps Script redirects
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, isDone: isNowDone })
                    }).catch(err => console.error('Fout bij opslaan:', err));
                }
            };

            const apply = () => { setFCli(new Set(tCli)); setFAss(new Set(tAss)); setDCli(false); setDAss(false); };

            return e('div', { className: "min-h-screen bg-[#f5f5f5] text-slate-900" },
                e('header', { className: "bg-white border-b sticky top-0 z-20" },
                    e('div', { className: "max-w-7xl mx-auto px-4 h-16 flex justify-between items-center" },
                        e('div', { className: "flex items-center gap-3" },
                            e('div', { className: "w-10 h-10 bg-uplifting-yellow rounded-xl flex items-center justify-center text-white shadow-lg" }, e(Icons.Calendar)),
                            e('div', null,
                                e('h1', { className: "text-xl font-bold font-koho" }, "Team Planner"),
                                e('div', { className: "flex items-center gap-2 text-[10px] font-black uppercase tracking-tighter" },
                                    e('button', { onClick: () => { setDAss(!dAss); setDCli(false); }, className: `hover:text-slate-900 ${dAss ? "text-uplifting-yellow" : "text-slate-400"}` }, `Medewerkers (${tAss.size})`),
                                    e('span', { className: "text-slate-200" }, "|"),
                                    e('button', { onClick: () => { setDCli(!dCli); setDAss(false); }, className: `hover:text-slate-900 ${dCli ? "text-uplifting-yellow" : "text-slate-400"}` }, `Klanten (${tCli.size})`),
                                    (tCli.size !== fCli.size || tAss.size !== fAss.size) && e('button', { onClick: apply, className: "ml-2 text-uplifting-yellow bg-uplifting-yellow/10 px-2 py-0.5 rounded" }, "Verversen")
                                )
                            )
                        ),
                        e('div', { className: "flex items-center gap-3" },
                            e('div', { className: "flex bg-slate-100 p-1 rounded-lg" },
                                ['day', 'week', 'month'].map(v => e('button', { key: v, onClick: () => setView(v), className: `px-3 py-1 text-xs font-bold rounded-md transition-all ${view === v ? "bg-white text-uplifting-yellow shadow-sm" : "text-slate-500 hover:text-slate-800"}` }, v === 'day' ? 'Dag' : v === 'week' ? 'Week' : 'Maand'))
                            ),
                            e('button', { onClick: () => setMon(!mon), className: `flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${mon ? "bg-uplifting-yellow text-white border-uplifting-yellow shadow-md" : "bg-white text-slate-700 border-slate-200 hover:border-uplifting-yellow"}` }, e(Icons.List), "Monitoring")
                        )
                    ),
                    dAss && e('div', { className: "absolute top-16 left-4 bg-white border rounded-xl shadow-xl p-3 z-30 grid grid-cols-2 gap-2 w-64" },
                        e('div', { className: "col-span-2 flex justify-between items-center mb-1 px-1" },
                            e('span', { className: "text-[10px] font-black uppercase text-slate-400" }, "Medewerkers"),
                            e('div', { className: "flex gap-2" },
                                e('button', { onClick: () => setTAss(new Set(allAssignees)), className: "text-[10px] font-black uppercase text-slate-400 hover:text-uplifting-yellow" }, "Alles selecteren"),
                                e('span', { className: "text-slate-200" }, "|"),
                                e('button', { onClick: () => setTAss(new Set()), className: "text-[10px] font-black uppercase text-slate-400 hover:text-uplifting-yellow" }, "Selectie opheffen")
                            )
                        ),
                        allAssignees.map(a => e('button', { key: a, onClick: () => { const n = new Set(tAss); n.has(a) ? n.delete(a) : n.add(a); setTAss(n); }, className: `px-3 py-1.5 text-xs rounded-lg border text-left flex justify-between items-center ${tAss.has(a) ? "bg-uplifting-yellow/10 border-uplifting-yellow text-uplifting-yellow" : "border-slate-100 text-slate-600"}` }, a, tAss.has(a) && e(Icons.Check)))
                    ),
                    dCli && e('div', { className: "absolute top-16 left-32 bg-white border rounded-xl shadow-xl p-3 z-30 grid grid-cols-2 gap-2 w-72 max-h-96 overflow-y-auto custom-scrollbar" },
                        e('div', { className: "col-span-2 flex justify-between items-center mb-1 px-1" },
                            e('span', { className: "text-[10px] font-black uppercase text-slate-400" }, "Klanten"),
                            e('div', { className: "flex gap-2" },
                                e('button', { onClick: () => setTCli(new Set(allClients)), className: "text-[10px] font-black uppercase text-slate-400 hover:text-uplifting-yellow" }, "Alles selecteren"),
                                e('span', { className: "text-slate-200" }, "|"),
                                e('button', { onClick: () => setTCli(new Set()), className: "text-[10px] font-black uppercase text-slate-400 hover:text-uplifting-yellow" }, "Selectie opheffen")
                            )
                        ),
                        allClients.map(c => e('button', { key: c, onClick: () => { const n = new Set(tCli); n.has(c) ? n.delete(c) : n.add(c); setTCli(n); }, className: `px-3 py-1.5 text-xs rounded-lg border text-left flex justify-between items-center ${tCli.has(c) ? "bg-uplifting-yellow/10 border-uplifting-yellow text-uplifting-yellow" : "border-slate-100 text-slate-600"}` }, c, tCli.has(c) && e(Icons.Check)))
                    )
                ),
                e('main', { className: "max-w-7xl mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8" },
                    e('div', { className: "w-full lg:w-72 flex-shrink-0 space-y-6" },
                        e('div', { className: "bg-white rounded-2xl border p-5 shadow-sm" },
                            e('div', { className: "flex justify-between items-center mb-4" },
                                e('h2', { className: "font-bold text-sm" }, dateUtils.fmtM(cur)),
                                e('div', { className: "flex gap-1" },
                                    e('button', { onClick: () => setCur(dateUtils.addM(cur, -1)), className: "p-1 hover:bg-slate-100 rounded" }, e(Icons.ChevronLeft)),
                                    e('button', { onClick: () => setCur(dateUtils.addM(cur, 1)), className: "p-1 hover:bg-slate-100 rounded" }, e(Icons.ChevronRight))
                                )
                            ),
                            e('div', { className: "grid grid-cols-7 gap-1 text-[10px] font-bold text-slate-300 text-center mb-2" }, ['M','D','W','D','V','Z','Z'].map(d => e('span', { key: d }, d))),
                            e('div', { className: "grid grid-cols-7 gap-1" }, (() => {
                                const s = dateUtils.startW(dateUtils.startM(cur)), days = [];
                                let c = new Date(s);
                                for(let i=0; i<42; i++) { days.push(new Date(c)); c.setDate(c.getDate()+1); }
                                return days.map(d => {
                                    const isS = dateUtils.isSameD(d, sel), isM = dateUtils.isSameM(d, cur), has = sched.some(t => dateUtils.isSameD(t.date, d) && fCli.has(t.client) && fAss.has(t.assignee));
                                    return e('button', { key: d.toISOString(), onClick: () => setSel(d), className: `aspect-square flex flex-col items-center justify-center rounded-lg text-xs font-bold relative ${!isM ? "text-slate-200" : isS ? "bg-uplifting-yellow text-white shadow-md" : "hover:bg-slate-50"}` }, d.getDate(), has && !isS && e('span', { className: "absolute bottom-1 w-1 h-1 bg-uplifting-yellow rounded-full" }));
                                });
                            })())
                        ),
                        e('div', { className: "bg-uplifting-yellow rounded-2xl p-5 shadow-sm text-slate-900" },
                            e('h3', { className: "text-[10px] font-black uppercase tracking-widest mb-3 opacity-70" }, "Voortgang"),
                            e('div', { className: "flex justify-between text-sm font-bold mb-2" }, e('span', null, "Voltooid"), e('span', null, `${stats.c}/${stats.t}`)),
                            e('div', { className: "w-full bg-black/10 h-2 rounded-full overflow-hidden" }, e('div', { className: "h-full bg-white transition-all duration-500", style: { width: `${stats.p}%` } })),
                            e('p', { className: "text-[10px] font-bold mt-2 opacity-60 text-center" }, `${stats.p}% KLAAR`)
                        )
                    ),
                    e('div', { className: "flex-grow space-y-6" },
                        e('div', { className: "flex flex-col sm:flex-row sm:items-end justify-between gap-4" },
                            e('div', null,
                                e('h2', { className: "text-2xl font-bold font-koho" }, view === 'day' ? dateUtils.fmtD(sel) : view === 'week' ? `Week ${dateUtils.getW(sel)}` : `Planning ${dateUtils.fmtM(cur)}`),
                                e('p', { className: "text-slate-400 text-xs font-bold uppercase" }, `${final.length} taken gevonden`)
                            ),
                            e('div', { className: "flex bg-white p-1 rounded-lg border text-[10px] font-black uppercase" },
                                ['all', 'open', 'completed'].map(f => e('button', { key: f, onClick: () => setFComp(f), className: `px-3 py-1 rounded-md transition-all ${fComp === f ? "bg-slate-900 text-white" : "text-slate-400 hover:text-slate-600"}` }, f === 'all' ? 'Alle' : f === 'open' ? 'Open' : 'Gedaan'))
                            )
                        ),
                        final.length > 0 ? e('div', { className: "space-y-4" }, final.map(t => {
                            const style = catStyles[t.category] || { c: 'bg-slate-50', i: Icons.Grid };
                            if(t.isG) {
                                const allD = t.sub.every(s => done.has(s.instanceId));
                                return e('div', { key: t.instanceId, className: `bg-white p-5 rounded-2xl border transition-all ${allD ? "opacity-50 border-emerald-100 bg-emerald-50/20" : "border-slate-200 shadow-sm"}` },
                                    e('div', { className: "flex items-center gap-4 mb-4" },
                                        e('div', { className: `w-10 h-10 rounded-xl flex items-center justify-center border shrink-0 ${style.c}` }, e(style.i)),
                                        e('div', null, e('p', { className: "text-[10px] font-black uppercase text-slate-300" }, `Groep • ${t.assignee}`), e('h3', { className: `font-bold ${allD ? "line-through" : ""}` }, t.title))
                                    ),
                                    e('div', { className: "grid grid-cols-2 sm:grid-cols-4 gap-2" }, t.sub.map(s => {
                                        const d = done.has(s.instanceId);
                                        return e('button', { key: s.instanceId, onClick: () => toggle(s.instanceId), className: `flex items-center gap-2 p-2 rounded-xl border text-[10px] font-black uppercase transition-all ${d ? "bg-emerald-500 border-emerald-500 text-white" : "bg-slate-50 border-slate-100 text-slate-400 hover:border-uplifting-yellow/50"}` },
                                            e('div', { className: `w-4 h-4 rounded-full border flex items-center justify-center shrink-0 ${d ? "bg-white text-emerald-500" : "bg-white border-slate-200"}` }, d && e(Icons.Check)), e('span', { className: "truncate" }, s.client)
                                        );
                                    }))
                                );
                            }
                            const d = done.has(t.instanceId);
                            return e('div', { key: t.instanceId, className: `bg-white p-5 rounded-2xl border flex items-center gap-4 transition-all ${d ? "opacity-50 border-emerald-100 bg-emerald-50/20" : "border-slate-200 shadow-sm hover:border-uplifting-yellow/30"}` },
                                e('div', { className: `w-10 h-10 rounded-xl flex items-center justify-center border shrink-0 ${style.c}` }, e(style.i)),
                                e('div', { className: "flex-grow min-w-0" }, e('p', { className: "text-[10px] font-black uppercase text-slate-300" }, `${t.client} • ${t.assignee} • ${t.frequency}`), e('h3', { className: `font-bold truncate ${d ? "line-through text-slate-400" : ""}` }, t.title)),
                                (view !== 'day' || mon) && e('div', { className: "text-right hidden sm:block shrink-0" }, e('p', { className: "text-xs font-bold" }, dateUtils.fmtS(t.date)), e('p', { className: "text-[10px] font-bold text-slate-300 uppercase" }, dateUtils.fmtW(t.date))),
                                e('button', { onClick: () => toggle(t.instanceId), className: `w-8 h-8 rounded-full border-2 flex items-center justify-center shrink-0 transition-all ${d ? "bg-emerald-500 border-emerald-500 text-white" : "border-slate-200 hover:border-uplifting-yellow"}` }, d ? e(Icons.Check) : e('div', { className: "w-1.5 h-1.5 bg-slate-200 rounded-full" }))
                            );
                        })) : e('div', { className: "bg-white rounded-3xl border border-dashed p-16 text-center text-slate-300" }, e(Icons.Inbox), e('p', { className: "mt-4 font-bold uppercase text-xs tracking-widest" }, "Geen taken gevonden"))
                    )
                )
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    </script>
</body>
</html>
